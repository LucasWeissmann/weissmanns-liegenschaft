<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0d9488" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Liegenschaft" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://www.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <title>Weißmanns Liegenschaft</title>
  </head>
  <body>
    <div id="root">
      <div style="min-height:100dvh;display:flex;flex-direction:column;background:#faf9f6;font-family:-apple-system,BlinkMacSystemFont,sans-serif">
        <div style="padding:20px 24px 8px">
          <div style="display:flex;align-items:center;gap:12px">
            <div style="width:48px;height:48px;border-radius:16px;background:linear-gradient(135deg,#14b8a6,#0d9488);opacity:.3"></div>
            <div>
              <div style="height:20px;width:200px;border-radius:10px;background:#e8e5e0"></div>
              <div style="height:14px;width:140px;border-radius:8px;background:#e8e5e0;margin-top:6px"></div>
            </div>
          </div>
        </div>
        <div style="padding:16px 24px">
          <div style="background:rgba(255,255,255,.5);border-radius:24px;padding:20px;border:1px solid rgba(255,255,255,.7)">
            <div style="height:18px;width:180px;border-radius:10px;background:#e8e5e0;margin:0 auto"></div>
          </div>
        </div>
        <div style="padding:0 24px;display:flex;flex-direction:column;gap:16px">
          <div style="background:rgba(255,255,255,.35);border-radius:24px;padding:24px;border:1px solid rgba(255,255,255,.5)">
            <div style="display:flex;justify-content:space-between;margin-bottom:16px">
              <div style="height:16px;width:60px;border-radius:8px;background:#e8e5e0"></div>
              <div style="height:16px;width:80px;border-radius:8px;background:#e8e5e0"></div>
            </div>
            <div style="height:48px;border-radius:16px;background:#e8e5e0"></div>
          </div>
          <div style="background:rgba(255,255,255,.35);border-radius:24px;padding:24px;border:1px solid rgba(255,255,255,.5)">
            <div style="display:flex;justify-content:space-between;margin-bottom:16px">
              <div style="height:16px;width:60px;border-radius:8px;background:#e8e5e0"></div>
              <div style="height:16px;width:80px;border-radius:8px;background:#e8e5e0"></div>
            </div>
            <div style="height:48px;border-radius:16px;background:#e8e5e0"></div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
